<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninjago-Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  padding: 50px 20px;
}

header h1 {
  font-size: 40px;
  margin: 0;
}

header p {
  opacity: 0.7;
}

/* BUTTON GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

/* CARD BUTTON */
.card {
  background: #111;
  padding: 25px;
  border-radius: 15px;
  border: 1px solid #333;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
  border-color: red;
}

/* LINK STYLE */
a {
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>🎧 Ninjago-Music</h1>
  <p>A collection of legendary Ninjago soundtracks</p>
</header>

<div class="grid">

  <a href="music.html">
    <div class="card">
      🎵 Enter Music Library
    </div>
  </a>

  <div class="card">
    🔥 Featured Tracks
  </div>

  <div class="card">
    ⚔️ Battle Themes
  </div>

</div>

</body>
</html>
