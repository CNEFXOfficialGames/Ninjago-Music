<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninjago-Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #3a0000, #000);
  overflow: hidden;
}

/* GLOW BACKGROUND EFFECT */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: red;
  filter: blur(200px);
  opacity: 0.15;
  border-radius: 50%;
}

/* MAIN CARD */
.card {
  position: relative;
  text-align: center;
  padding: 50px 40px;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid #333;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255,0,0,0.2);
  backdrop-filter: blur(10px);
}

/* TITLE */
h1 {
  margin: 0;
  font-size: 50px;
  letter-spacing: 2px;
}

/* SUBTEXT */
p {
  opacity: 0.7;
  margin-top: 10px;
}

/* BUTTON */
a {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 24px;
  background: red;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.2s;
}

a:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px red;
}

/* SMALL FOOTER TEXT */
small {
  display: block;
  margin-top: 20px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">
  <h1>🎧 Ninjago-Music</h1>
  <p>The ultimate Ninjago soundtrack collection</p>

  <a href="music.html">Enter Music Library</a>

  <small>Built by you • Fan project</small>
</div>

</body>
</html>
